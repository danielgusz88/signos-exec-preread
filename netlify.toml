[build]
  command = "npm run build && rm -rf out/api"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"

# API routes → Netlify Functions (must come before catch-all, force=true overrides)
[[redirects]]
  from = "/api/integrations/mode/test"
  to = "/.netlify/functions/mode-test"
  status = 200
  force = true

[[redirects]]
  from = "/api/integrations/iterable/campaigns"
  to = "/.netlify/functions/iterable-campaigns"
  status = 200
  force = true

[[redirects]]
  from = "/api/integrations/iterable/test"
  to = "/.netlify/functions/iterable-test"
  status = 200
  force = true

[[redirects]]
  from = "/api/integrations/shopify/test"
  to = "/.netlify/functions/shopify-test"
  status = 200
  force = true

[[redirects]]
  from = "/api/data/status"
  to = "/.netlify/functions/data-status"
  status = 200
  force = true

[[redirects]]
  from = "/api/data/mode"
  to = "/.netlify/functions/mode-data"
  status = 200
  force = true

[[redirects]]
  from = "/api/data/mode-shopify"
  to = "/.netlify/functions/mode-shopify-data"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/ideate"
  to = "/.netlify/functions/content-ideate"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/fal"
  to = "/.netlify/functions/content-fal"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/cron"
  to = "/.netlify/functions/content-cron"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/review"
  to = "/.netlify/functions/content-review"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/compose"
  to = "/.netlify/functions/content-compose"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/recraft"
  to = "/.netlify/functions/content-recraft"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/feedback"
  to = "/.netlify/functions/content-feedback"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/iterate"
  to = "/.netlify/functions/content-iterate"
  status = 200
  force = true

[[redirects]]
  from = "/api/content/figma-agent"
  to = "/.netlify/functions/content-figma-agent"
  status = 200
  force = true

[functions."content-cron"]
  schedule = "0 8 * * *"

# SPA catch-all (client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
