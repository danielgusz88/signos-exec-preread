[build]
  # Fail the build if static export did not produce a root page (avoids deploying an empty site).
  command = "npm run build && rm -rf out/api && rm -f out/_redirects && test -f out/index.html"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
  # Next.js Runtime v5 can break `output: 'export'` sites (empty/wrong publish → sitewide 404).
  # We publish static HTML from `out/` only; skip the SSR/edge runtime wrapper.
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Ensure skip applies for Git-triggered production & preview builds (not only local CLI).
[context.production.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[context.deploy-preview.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[functions]
  directory = "netlify/functions"

